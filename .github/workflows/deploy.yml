name: Build & Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1

      - name: Setup Node
        uses: actions/setup-node@v4.0.2
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          # SHA-256 of "RDesignsUnlock" — the case-study unlock password.
          # Hash is safe to expose (reversing requires brute-forcing the
          # original). Swap to a GitHub Secret like
          # ${{ secrets.PROJECT_PASSWORD_HASH }} if you ever want to rotate
          # without committing a workflow change.
          REACT_APP_PROJECT_PASSWORD_HASH: 18a45c7fec0bb00024f3c06a777a56e3917031c18bb58a04ea078f58512e18c8
        run: npm run build

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy via rsync with sshpass
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -rlvzO \
            --no-perms --no-owner --no-group \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./build/ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_TARGET }}

      - name: Purge Varnish cache
        run: |
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "varnishadm -S /etc/varnish/secret -T 127.0.0.1:6082 'ban req.url ~ .'"
