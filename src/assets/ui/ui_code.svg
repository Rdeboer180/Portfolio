<svg width="520" height="420" viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #1e1e1e; }
    .line { font-family: Menlo, Monaco, Consolas, monospace; font-size: 14px; }
    .comment { fill: #6a9955; }
    .var { fill: #c586c0; }
    .value { fill: #dcdcaa; }
    .number { fill: #b5cea8; }
    .white { fill: #ffffff; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg"/>

  <!-- Lines -->
  <text x="16" y="30" class="line comment">//== Colors</text>
  <text x="16" y="50" class="line comment">//</text>
  <text x="16" y="70" class="line comment">//## Gray and brand colors for use across theme.</text>

  <text x="16" y="100" class="line">
    <tspan class="var">$red:</tspan>
    <tspan class="white"> #d70000;</tspan>
  </text>

  <text x="16" y="120" class="line">
    <tspan class="var">$black:</tspan>
    <tspan class="value"> #3c3837;</tspan>
  </text>

  <text x="16" y="140" class="line">
    <tspan class="var">$black-transparent:</tspan>
    <tspan class="value"> rgba(</tspan>
    <tspan class="number">0, 0, 0, 0.6</tspan>
    <tspan class="value">);</tspan>
  </text>

  <text x="16" y="160" class="line">
    <tspan class="var">$blue:</tspan>
    <tspan class="value"> #2B7088;</tspan>
  </text>

  <text x="16" y="180" class="line">
    <tspan class="var">$white:</tspan>
    <tspan class="white"> #ffffff;</tspan>
  </text>

  <text x="16" y="210" class="line">
    <tspan class="var">$gray-lighter:</tspan>
    <tspan class="value"> #F7F7F7;</tspan>
  </text>

  <text x="16" y="230" class="line">
    <tspan class="var">$gray-light:</tspan>
    <tspan class="value"> #eaeaea;</tspan>
  </text>

  <text x="16" y="250" class="line">
    <tspan class="var">$gray:</tspan>
    <tspan class="value"> #c0c0c0;</tspan>
  </text>

  <text x="16" y="270" class="line">
    <tspan class="var">$gray-medium:</tspan>
    <tspan class="value"> #666666;</tspan>
  </text>

  <text x="16" y="290" class="line">
    <tspan class="var">$gray-dark:</tspan>
    <tspan class="value"> #3c3837;</tspan>
  </text>

  <text x="16" y="310" class="line">
    <tspan class="var">$gold:</tspan>
    <tspan class="value"> #F2A633;</tspan>
  </text>

  <text x="16" y="340" class="line">
    <tspan class="var">$blacktext:</tspan>
    <tspan class="value"> #19170d;</tspan>
  </text>

  <text x="16" y="360" class="line">
    <tspan class="var">$yellow:</tspan>
    <tspan class="value"> #FFEA00;</tspan>
  </text>

  <text x="16" y="390" class="line">
    <tspan class="var">$brand-primary:</tspan>
    <tspan class="value"> var(--brandPrimary, </tspan>
    <tspan class="var">$red</tspan>
    <tspan class="value">);</tspan>
  </text>

  <text x="16" y="410" class="line">
    <tspan class="var">$brand-secondary:</tspan>
    <tspan class="value"> var(--brandSecondary, </tspan>
    <tspan class="var">$white</tspan>
    <tspan class="value">);</tspan>
  </text>

  <text x="16" y="430" class="line">
    <tspan class="var">$brand-third:</tspan>
    <tspan class="value"> var(--brandThird, </tspan>
    <tspan class="var">$black</tspan>
    <tspan class="value">);</tspan>
  </text>
</svg>